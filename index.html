<head>

    <style>
        :root {
            --primary: #003366;
            --secondary: #f4f6f9;
            --success: #28a745;
            --danger: #dc3545;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background: var(--secondary);
            border: 1px solid #ccc;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px 4px 0 0;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .module-content {
            display: none;
        }
        .module-content.active {
            display: block;
        }
        .score-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }
        .question-card {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
        }
        .option-item {
            background: white;
            border: 1px solid #ccc;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .option-item:hover {
            background: #f0f4f8;
        }
        .option-item.correct {
            background: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
            font-weight: bold;
        }
        .option-item.incorrect {
            background: #f8d7da !important;
            border-color: var(--danger) !important;
            color: #721c24;
        }
        .disabled {
            pointer-events: none;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            border-radius: 4px;
        }
    </style>
</head>

<script>

        mod1: [
            { q: "Which regulatory body in Australia is primarily responsible for the prudential supervision of banks, credit unions, building societies, and insurance companies?", o: ["ASIC", "RBA", "APRA", "ACCC"], a: 2, e: "The Australian Prudential Regulation Authority (APRA) is responsible for the prudential regulation of financial institutions to ensure safety and stability." },
            { q: "What is the fundamental role of the Reserve Bank of Australia (RBA) in the financial system?", o: ["Consumer protection and market integrity", "Monetary policy implementation and systemic stability", "Issuing corporate securities licenses", "Supervising the ASX listing rules"], a: 1, e: "The RBA's primary mandate involves conducting monetary policy, maintaining financial system stability, and managing the payments system." },
            { q: "Which market deals primarily with short-term, highly liquid debt instruments with maturities of less than one year?", o: ["Capital market", "Corporate bond market", "Money market", "Equity market"], a: 2, e: "The money market is dedicated to short-term borrowing and lending, typically involving instruments with maturities up to one year." },
            { q: "What type of intermediation occurs when a bank accepts deposits from surplus units and lends them to deficit units under its own name?", o: ["Direct intermediation", "Financial intermediation", "Market-based financing", "Disintermediation"], a: 1, e: "Financial intermediation involves financial institutions acting as a bridge between savers and borrowers, absorbing risks and altering maturities." },
            { q: "Eurobonds are best defined as bonds that are:", o: ["Issued only within Eurozone countries", "Denominated in Euros and issued globally", "Denominated in a currency other than that of the country in which they are issued", "Sold exclusively to European central banks"], a: 2, e: "A Eurobond is an international bond issued in a currency separate from the native currency of the country or market where it is issued." },
            { q: "Under the 'Twin Peaks' regulatory model in Australia, which entity governs corporate conduct, disclosure, and financial consumer protection?", o: ["APRA", "Treasury", "ASIC", "FIRB"], a: 2, e: "The Australian Securities and Investments Commission (ASIC) enforces market integrity and consumer protection laws." },
            { q: "Which of the following is a key characteristic of money market instruments?", o: ["High capital gains potential", "Low liquidity and high yields", "Deep primary market but no secondary market", "Low default risk and high liquidity"], a: 3, e: "Money market instruments (e.g., Treasury notes, commercial paper) feature low risk, predictable returns, and highly liquid secondary markets." },
            { q: "What is the primary function of a primary financial market?", o: ["Allowing investors to trade existing securities among themselves", "Facilitating the issuance of brand-new securities to raise new capital", "Providing hedging mechanisms against exchange rate volatility", "Providing clearinghouse services for derivative instruments"], a: 1, e: "The primary market is where companies or governments issue new debt or equity securities for the first time." },
            { q: "A foreign bond is a bond that is issued:", o: ["Outside the issuer's home country but denominated in the home country's currency", "In a domestic market by a foreign issuer, denominated in the domestic currency", "Internationally, denominated in a basket of multiple global currencies", "Solely by multilateral developmental agencies like the World Bank"], a: 1, e: "Foreign bonds are issued by foreign entities into a local domestic market and denominated in that domestic currency (e.g., Yankee bonds in the US)." },
            { q: "What is an example of direct finance?", o: ["An investor purchasing newly issued corporate shares via a public float", "A saver placing funds into a fixed-term savings deposit account", "A business securing a traditional commercial loan from a commercial bank", "An insurance firm buying government bonds using premium revenues"], a: 0, e: "Direct finance bypasses commercial financial institutions, allowing borrowers and lenders to interact directly via capital markets." },
            { q: "Which instrument represents a short-term unsecured promissory note issued by highly rated corporations to raise cash?", o: ["Treasury Bond", "Certificate of Deposit", "Bank Bill", "Commercial Paper"], a: 3, e: "Commercial paper is an unsecured, short-term debt tool used by premium corporate borrowers." },
            { q: "Bank accepted bills (BABs) are highly liquid in Australia because:", o: ["They carry a performance guarantee by a commercial bank", "They are backed directly by the gold reserves of the RBA", "They carry equity options convertible at maturity", "They never experience fluctuations in price"], a: 0, e: "The bank's formal acceptance means it takes ultimate payment liability, drastically lowering default risk and driving liquidity." },
            { q: "The mechanism through which RBA monetary policy changes affect the broader economy is known as the:", o: ["Fiscal multiplier process", "Transmission mechanism", "Capital adequacy framework", "Liquidity preference theory"], a: 1, e: "The monetary policy transmission mechanism explains how adjustments to the official cash rate trickle down to affect market rates and economic demand." },
            { q: "What occurs during financial disintermediation?", o: ["More depositors flock to traditional banks for security", "Borrowers and lenders bypass intermediaries to transact directly in capital markets", "Regulators merge APRA and ASIC into a single agency", "Banks increase their net interest margins"], a: 1, e: "Disintermediation happens when market participants extract their funds from intermediaries to trade directly via financial markets." },
            { q: "Which of the following markets allows participants to lock in exchange rates for transactions occurring 90 days in the future?", o: ["Spot market", "Forward market", "Primary equity market", "Call money market"], a: 1, e: "The forward market involves customized contracts to buy/sell assets or currencies at a specified future date and predefined price." },
            { q: "Which regulatory body is responsible for monitoring competition and anti-competitive behavior within financial services?", o: ["ASIC", "RBA", "APRA", "ACCC"], a: 3, e: "The Australian Competition and Consumer Commission (ACCC) regulates market competition across all business landscapes, including finance." },
            { q: "A company wishes to issue long-term debt to fund an international factory setup. Which market should it access?", o: ["Money market", "Capital market", "Derivatives market", "Working capital market"], a: 1, e: "Long-term capital expenditure and funding requirements are met via the capital market (debt and equity instruments > 1 year)." },
            { q: "What distinguishes a Certificate of Deposit (CD) from a standard bank deposit?", o: ["CDs cannot be traded in secondary markets", "CDs are short-term negotiable debt securities issued by banks", "CDs are issued exclusively by non-bank financial intermediaries", "CDs do not yield interest"], a: 1, e: "A CD is a negotiable instrument, meaning the original depositor can sell it to another party in the secondary money market before maturity." },
            { q: "International capital markets provide what primary benefit to domestic firms?", o: ["Total exemption from domestic tax obligations", "Complete insulation from exchange rate risk", "Access to deeper pools of funds, potentially at a lower cost", "Elimination of credit underwriting standards"], a: 2, e: "Accessing foreign or international capital pools allows domestic entities to diversify funding origins and minimize financing costs." },
            { q: "If the RBA buys government securities via Open Market Operations (OMO), it intends to:", o: ["Drain liquidity and increase interest rates", "Inject liquidity and ease upward pressures on interest rates", "Balance the federal budget deficit", "Restrict commercial banks from giving mortgages"], a: 1, e: "Purchasing securities injects cash reserves directly into the banking system, increasing liquidity." }
        ],
        mod2: [
            { q: "If you invest $1,000 today at an annual interest rate of 6% compounded annually, what will be the value at the end of 3 years?", o: ["$1,180.00", "$1,191.02", "$1,210.15", "$1,060.00"], a: 1, e: "Using the future value formula: FV = PV * (1 + r)^n = 1,000 * (1.06)^3 = 1,191.02" },
            { q: "According to the Capital Asset Pricing Model (CAPM), the expected return of an asset depends exclusively on its:", o: ["Total risk", "Unsystematic risk", "Systematic risk", "Diversifiable risk"], a: 2, e: "CAPM posits that because unsystematic risk can be diversified away, investors are only compensated for systematic risk (Beta)." },
            { q: "A market where stock prices reflect all publicly available information, including historical data and financial statements, is efficient in the:", o: ["Weak form", "Semi-strong form", "Strong form", "Fundamental form"], a: 1, e: "Semi-strong efficiency states that current stock prices adjust instantly to all public data; fundamental analysis cannot yield abnormal returns." },
            { q: "What type of efficiency is achieved when resources are allocated to their highest-value uses across the economy?", o: ["Pricing efficiency", "Operational efficiency", "Allocative efficiency", "Informational efficiency"], a: 2, e: "Allocative efficiency ensures capital flows to the most productive and profitable investment opportunities." },
            { q: "If a security has a Beta of 0.5, it means the security is:", o: ["Half as volatile as the market portfolio", "Twice as volatile as the market portfolio", "Completely risk-free", "Inversely correlated with market movements"], a: 0, e: "A beta of 1.0 matches the market. A beta of 0.5 indicates the security's returns move with half the systematic volatility of the market." },
            { q: "You are promised an ordinary annuity that pays $500 at the end of each year for 4 years. If the discount rate is 5%, what is its present value today?", o: ["$2,000.00", "$1,814.24", "$1,772.98", "$1,904.76"], a: 2, e: "PV = PMT * [(1 - (1+r)^-n) / r] = 500 * [(1 - (1.05)^-4) / 0.05] = 1,772.98." },
            { q: "Unsystematic risk is also known as:", o: ["Market risk", "Non-diversifiable risk", "Specific risk", "Macroeconomic risk"], a: 2, e: "Unsystematic risk is company- or industry-specific risk and can be eliminated through broad portfolio diversification." },
            { q: "If the Efficient Market Hypothesis (EMH) holds in its strong form, who can consistently earn abnormal returns?", o: ["Corporate insiders", "Technical analysts", "Fundamental research firms", "No one"], a: 3, e: "Strong-form efficiency states that all information (public and private/insider) is fully reflected in prices; hence, nobody can earn abnormal returns." },
            { q: "Operational efficiency in capital markets focuses on:", o: ["Ensuring asset prices match intrinsic value", "Minimizing transaction costs and friction for buyers and sellers", "Directing public funds toward government initiatives", "Maximizing trading volumes on the stock exchange"], a: 1, e: "Operational (or internal) efficiency measures how cost-effectively transactions are executed in a market." },
            { q: "Calculate the expected return of an asset using CAPM given: Risk-free rate = 4%, Market return = 10%, and Beta = 1.2.", o: ["11.2%", "12.0%", "14.8%", "7.2%"], a: 0, e: "E(R) = Rf + Beta*(E(Rm) - Rf) = 4% + 1.2*(10% - 4%) = 4% + 7.2% = 11.2%." },
            { q: "What is the main difference between an ordinary annuity and an annuity due?", o: ["Ordinary annuities pay interest infinitely, while annuity dues expire", "Ordinary annuity cash flows occur at the end of each period; annuity due cash flows occur at the start", "Annuity dues are adjusted for inflation, whereas ordinary annuities are fixed", "Ordinary annuities relate only to debt securities"], a: 1, e: "Cash flows for an ordinary annuity occur at the end of each period, while an annuity due requires payments at the beginning of each period." },
            { q: "Diversification reduces portfolio risk by combining assets that are:", o: ["Perfectly positively correlated", "Not perfectly positively correlated", "Identical in beta values", "Highly sensitive to the same industry shocks"], a: 1, e: "Risk reduction works because asset price movements do not move perfectly in tandem, balancing out specific losses." },
            { q: "If technical analysis (analyzing past price trends) yields consistent abnormal returns, the market is:", o: ["Weak-form efficient", "Inefficient", "Semi-strong efficient", "Strong-form efficient"], a: 1, e: "Even weak-form efficiency implies that historical prices contain no profitable predictive power. If technical analysis works, the market fails weak-form efficiency." },
            { q: "The Security Market Line (SML) is a graphical representation of:", o: ["The relationship between total risk and expected return", "The Capital Asset Pricing Model (CAPM) showing systematic risk versus expected return", "The optimal mix of working capital assets", "The term structure of interest rates"], a: 1, e: "The SML plots expected asset returns against their systematic risk (Beta)." },
            { q: "What is the present value of a perpetuity paying $120 per year forever if the discount rate is 8%?", o: ["$1,500", "$1,200", "$960", "$1,080"], a: 0, e: "For a perpetuity, PV = PMT / r = 120 / 0.08 = 1,500." },
            { q: "Pricing efficiency implies that:", o: ["Brokerage fees are identical across all platforms", "Asset prices rapidly incorporate information to reflect intrinsic value", "Companies always price products to maximize profit margins", "Interest rates are set by government decree"], a: 1, e: "Pricing efficiency (external efficiency) means market prices reflect asset values accurately based on available data." },
            { q: "What does a negative portfolio beta imply?", o: ["The portfolio has more risk than the market", "The portfolio's returns generally move in the opposite direction of the market's returns", "The portfolio has zero unsystematic risk", "The portfolio guarantees a loss"], a: 1, e: "A negative beta means the asset behaves counter-cyclically, gaining when the market drops and vice versa." },
            { q: "Compounding more frequently than once a year (e.g., monthly) results in:", o: ["A lower future value compared to annual compounding", "A higher effective annual interest rate than the nominal rate", "A lower total interest paid over time", "No variance in investment returns"], a: 1, e: "Frequent compounding means interest earns interest sooner, driving the Effective Annual Rate (EAR) above the nominal stated rate." },
            { q: "An investor discovers that corporate executives are making huge profits by trading shares ahead of earnings announcements. This indicates the market is NOT efficient in the:", o: ["Weak form", "Semi-strong form", "Strong form", "Operational sense"], a: 2, e: "If private/insider info yields abnormal profits, the market lacks strong-form efficiency." },
            { q: "The market risk premium is represented mathematically in CAPM as:", o: ["Beta*(E(Rm) - Rf)", "E(Rm) - Rf", "Rf + Beta", "E(Rm) / Beta"], a: 1, e: "The market risk premium is the excess return expected from the market portfolio over the risk-free rate, denoted as (E(Rm) - Rf)." }
        ],
        mod3: [
            { q: "In business finance, 'risk' is most accurately defined as:", o: ["The certainty of experiencing an absolute financial loss", "The variability or uncertainty of future returns relative to an expected outcome", "Fraudulent activities occurring inside an entity", "Damage to physical equipment caused by natural disasters"], a: 1, e: "Financial risk refers to the volatility or distribution of potential outcomes around an expected mean." },
            { q: "Which type of international trade risk arises when a foreign buyer defaults or fails to pay for goods shipped?", o: ["Sovereign risk", "Credit (or default) risk", "Translation risk", "Political risk"], a: 1, e: "Commercial credit risk is the hazard of non-payment by a private foreign counterparty." },
            { q: "Sovereign risk is best described as the risk that:", o: ["A foreign government will default on its debt or obligations", "Foreign currency exchange rates will shift unfavorably", "An ocean cargo vessel will sink in transit", "Local consumer tastes will turn away from imports"], a: 0, e: "Sovereign risk relates specifically to a foreign central government defaulting or refusing to honor commitments." },
            { q: "A corporate exposure where changes in exchange rates alter the reported value of foreign subsidiaries' financial statements upon consolidation is known as:", o: ["Transaction risk", "Economic risk", "Translation risk", "Liquidity risk"], a: 2, e: "Translation (or accounting) risk stems from converting foreign currency financial balances into the home presentation currency for reporting." },
            { q: "What is transaction risk?", o: ["The long-term impact of exchange rates on a firm's global competitive edge", "The risk of loss on a specific, legally binding contract denominated in foreign currency due to exchange movements before settlement", "The risk that an electronic payment network crashes", "The risk that auditing fees rise unexpectedly"], a: 1, e: "Transaction exposure affects cash flows on committed contracts settled in foreign currencies." },
            { q: "Which financial instrument gives the holder the right, but not the obligation, to buy or sell an asset at a set price?", o: ["Forward contract", "Futures contract", "Option contract", "Interest rate swap"], a: 2, e: "Options offer optionality (rights without obligations) to the buyer, unlike forwards/futures which mandate execution." },

            { q: "Interest rate risk primarily impacts businesses by:", o: ["Modifying the book values of inventory", "Altering the cost of floating-rate debt and changing the market value of fixed-rate financial instruments", "Leading to labor strikes", "Rendering corporate patents obsolete"], a: 1, e: "Fluctuations in market interest rates impact the servicing costs of variable debt and the valuation of fixed debt portfolios." },

            { q: "Why is the after-tax cost of debt typically cheaper than the cost of equity for a profitable business?", o: ["Debt is riskier for investors than equity", "Equity dividends are tax-deductible for the company", "Interest payments are tax-deductible expenses, creating a tax shield", "Debt does not require principal repayments"], a: 2, e: "Interest reduces taxable income, which lowers the net cash cost of debt financing for the firm." },
            { q: "What is a 'right issue'?", o: ["Granting top executives options to buy stock", "Offering new shares to existing shareholders in proportion to their current holdings at a discount", "Selling assets to external entities at market values", "Delisting shares from the stock exchange"], a: 1, e: "Rights issues preserve ownership proportions by giving current shareholders the first option to buy new stock." },
            { q: "An operating lease differs from a finance lease because an operating lease:", o: ["Transfers all ownership risks and rewards to the lessee", "Is typically short-term and the lessor retains ownership risks", "Cannot be canceled under any condition", "Always features a bargain purchase option at the start"], a: 1, e: "Operating leases are operational rentals where the asset stays on the lessor's risk profile long-term." },
            { q: "Debt covenants are clauses in loan agreements designed to:", o: ["Increase the returns of equity investors", "Protect lenders by restricting certain actions or financial ratios of the borrower", "Ensure the company pays zero taxes", "Automatically convert debt into ordinary equity"], a: 1, e: "Covenants protect lenders by requiring borrowers to meet operational boundaries (e.g., maximum debt-to-equity caps)." },
            { q: "If a company raises money by issuing debentures, it is raising:", o: ["Short-term unsecured credit", "Secured long-term debt backed by a floating or fixed charge over assets", "Unsecured equity capital", "Venture capital seed funds"], a: 1, e: "Debentures are long-term debt instruments secured by security interests over corporate assets." },
            { q: "Under the dividend valuation model (Gordon Growth Model), if the next expected dividend (D1) is $2.00, the current stock price (P0) is $40.00, and dividends grow at a constant rate (g) of 5%, what is the cost of equity (Ke)?", o: ["5%", "10%", "11%", "9%"], a: 1, e: "Ke = (D1 / P0) + g = (2 / 40) + 0.05 = 0.05 + 0.05 = 10%." },
            { q: "Trade credit terms of '2/10, net 30' mean that the buyer can take a:", o: ["10% discount if paid within 2 days; otherwise settle full balance in 30 days", "2% discount if paid within 10 days; otherwise settle full balance in 30 days", "2% discount if paid within 30 days", "30% discount if paid in 10 installments"], a: 1, e: "The terms specify a 2% discount for early settlement within 10 days; otherwise, the net invoice is due in 30 days." },
            { q: "What is the approximate annualized cost of foregoing the trade credit discount in terms '2/10, net 30' (assume a 365-day year)?", o: ["24.3%", "37.2%", "12.4%", "2.0%"], a: 1, e: "Cost = [Discount% / (100 - Discount%)] * [365 / (Credit Period - Discount Period)] = (2/98) * (365/20) = 37.24%." },
            { q: "Which of the following increases a firm's financial leverage?", o: ["Issuing new ordinary shares to pay off loans", "Increasing the proportion of debt relative to equity in the capital structure", "Retaining profits instead of distributing dividends", "Selling machinery to reduce debt"], a: 1, e: "Financial leverage rises when fixed-cost debt capital is increased relative to variable equity capital." },
            { q: "A zero-coupon bond is a bond that:", o: ["Pays variable floating interest rates every quarter", "Pays no periodic interest and is issued at a deep discount to face value", "Is exempt from capital gains taxes", "Never matures"], a: 1, e: "Zero-coupon bonds offer returns via capital appreciation, as they are bought at a discount and redeemed at face value at maturity." },
            { q: "When calculating the weights for WACC, it is theoretically preferable to use:", o: ["Book values of debt and equity", "Historical target figures from founding documents", "Market values of debt and equity", "Liquidation value of total physical inventory"], a: 2, e: "WACC reflects the current opportunity cost of capital; hence, weights should be based on current market valuations." },
            { q: "Term loans are an example of:", o: ["Short-term spontaneous financing", "Medium- to long-term negotiated debt finance", "Primary equity market financing", "Non-bank unsecured commercial bills"], a: 1, e: "Term loans are negotiated corporate bank placements running across set multi-year schedules." },
            { q: "Venture capital is most suitable for companies that are:", o: ["Large, stable blue-chip corporations with low growth", "Government-owned utilities", "High-risk, early-stage startups with high growth potential", "Distressed companies entering liquidation"], a: 2, e: "Venture capitalists offer high-risk equity funding to early-stage ventures in exchange for equity stakes." },
            { q: "What effect does an increase in the corporate tax rate have on a firm's WACC, assuming all other variables remain constant?", o: ["WACC increases", "WACC decreases", "WACC remains unchanged", "WACC doubles"], a: 1, e: "A higher tax rate increases the value of the interest tax shield, lowering the after-tax cost of debt and reducing the total WACC." },
            { q: "Retained earnings represent:", o: ["Cash hoarded in vaults that cannot be spent", "Internal equity generated through accumulated undistributed profits", "Short-term debt owed to directors", "Asset depreciation provisions"], a: 1, e: "Retained earnings are profits reinvested back into the business rather than paid out as shareholder dividends." }
        ],
        mod5: [
            { q: "Working capital management is primarily concerned with managing:", o: ["Long-term real estate investments", "The balance between current assets and current liabilities", "Executive bonus structures", "The retirement of bond issues"], a: 1, e: "Working capital focus centers on short-term operational accounts (liquidity, debtors, inventory, payables)." },
            { q: "The 'Operating Cycle' of a firm is defined as the time elapsed between:", o: ["Buying raw materials and paying cash to suppliers", "Purchasing raw materials and collecting cash from sales to customers", "Paying cash to suppliers and collecting cash from customers", "Signing a lease and retiring the asset"], a: 1, e: "Operating Cycle = Days Inventory Outstanding (DIO) + Days Sales Outstanding (DSO). It covers the full operational span from inventory intake to debtor collection." },
            { q: "The 'Cash Conversion Cycle' (or Net Operating Cycle) is calculated as:", o: ["Operating Cycle + Days Payables Outstanding", "Operating Cycle - Days Payables Outstanding", "Days Inventory Outstanding - Days Sales Outstanding", "Days Payables Outstanding - Days Sales Outstanding"], a: 1, e: "Cash Conversion Cycle = DIO + DSO - DPO. It tracks how long cash is tied up before recovery." },
            { q: "A firm has Days Inventory Outstanding (DIO) = 40 days, Days Sales Outstanding (DSO) = 30 days, and Days Payables Outstanding (DPO) = 25 days. Calculate its Cash Conversion Cycle.", o: ["95 days", "45 days", "35 days", "15 days"], a: 1, e: "CCC = 40 + 30 - 25 = 45 days." },
            { q: "An aggressive working capital asset funding strategy involves:", o: ["Funding all current assets with long-term equity capital", "Funding temporary current assets and some permanent current assets with short-term debt", "Keeping immense cash piles to avoid using credit lines", "Matching the exact lifecycle of assets with identical debt terms"], a: 1, e: "Aggressive working capital strategies rely on cheap but volatile short-term financing to cover long-term core current asset needs." },
            { q: "What is a key disadvantage of holding excessively high levels of working capital (e.g., massive cash and inventory balances)?", o: ["Higher probability of insolvency", "Lower liquidity ratios", "Opportunity cost of foregone returns on higher-yielding long-term investments", "Inability to satisfy supplier claims"], a: 2, e: "Cash and inventory are low-yield assets; tying up excessive funds in them reduces overall Return on Capital Employed (ROCE)." },
            { q: "Under the Economic Order Quantity (EOQ) model, the optimal order size minimizes the sum of:", o: ["Purchase costs and shipping costs", "Ordering costs and carrying (holding) costs", "Production costs and stockout penalties", "Import duties and insurance"], a: 1, e: "EOQ balances the tradeoff between transaction costs per order and storage/holding costs for keeping inventory." },
            { q: "If a company extends its credit terms to customers from 30 days to 60 days, what is the likely impact on working capital?", o: ["Accounts receivable balance will decrease, shortening the cash cycle", "Accounts receivable balance will increase, lengthening the cash cycle", "Cash balances will rise instantly", "Accounts payable will decrease"], a: 1, e: "Relaxed credit terms leave customer funds outstanding longer, increasing receivables and tying up working capital cash." },
            { q: "The 'Current Ratio' is computed as:", o: ["Current Assets - Current Liabilities", "Current Assets / Current Liabilities", "(Cash + Receivables) / Current Liabilities", "Total Assets / Total Liabilities"], a: 1, e: "The current ratio measures basic short-term liquidity by evaluating available liquid resources against near-term claims." },
            { q: "The Quick Ratio (Acid-Test Ratio) excludes which asset from its numerator?", o: ["Cash", "Accounts Receivable", "Inventory", "Marketable Securities"], a: 2, e: "Inventory is removed because it is typically the least liquid current asset and hardest to convert to cash quickly." },
            { q: "What does a cash budget reveal to a financial manager?", o: ["Historical profitability over the past decade", "Projected future cash surpluses or deficits over a specific planning horizon", "The exact liquidation value of physical plant infrastructure", "Market price movements of common stock"], a: 1, e: "Cash budgets plot future operational cash receipts and payments to help manage liquidity." },
            { q: "A conservative working capital investment policy means the firm holds:", o: ["Zero cash balances and relies entirely on overdrafts", "High levels of cash, marketable securities, and inventory to minimize stockouts and defaults", "Minimal current assets to maximize operational risk", "Only fixed assets"], a: 1, e: "Conservative policies prioritize safety, keeping high safety margins in current assets to minimize operational disruptions." },
            { q: "Overtrading occurs when a business:", o: ["Sells too many long-term fixed assets", "Expands sales volumes too rapidly without securing adequate working capital funding, causing a cash crunch", "Limits credit sales to reliable buyers only", "Has excessive cash reserves and no investment ideas"], a: 1, e: "Overtrading happens when top-line revenue growth strains liquid cash reserves, leading to technical insolvency despite profitability." },
            { q: "What is the effect of increasing Days Payables Outstanding (DPO) on the cash conversion cycle?", o: ["It lengthens the cash conversion cycle", "It shortens the cash conversion cycle", "It has no effect on the cash conversion cycle", "It eliminates the need for credit sales"], a: 1, e: "Delaying payments to suppliers preserves corporate cash longer, reducing the net cash conversion cycle." },
            { q: "Which of the following is considered a spontaneous source of short-term finance?", o: ["Bank term loans", "Trade credit", "Debenture issues", "Right issues"], a: 1, e: "Trade credit arises naturally from regular transactions without formal bank negotiations." },
            { q: "A concentration banking system is used by corporations to:", o: ["Decentralize account oversight across hundreds of small bank branches", "Speed up cash collections by redirecting regional customer payments into central accounts", "Avoid paying capital gains taxes", "Hide non-performing short-term investments"], a: 1, e: "Concentration banking consolidates regional cash receipts into central accounts to maximize usable liquid funds." },
            { q: "The Baumol model of cash management applies which framework to determine optimal cash balances?", o: ["The Capital Asset Pricing Model (CAPM)", "The Inventory Economic Order Quantity (EOQ) framework", "The Efficient Market Hypothesis", "Regression analysis of share prices"], a: 1, e: "The Baumol model treats cash balances like inventory, balancing the opportunity cost of holding cash against the transaction costs of liquidating securities." },
            { q: "What is 'Factoring with recourse'?", o: ["The factor assumes all credit losses if customers default", "The selling firm must buy back any uncollectible accounts receivable from the factor", "The factor pays the firm without charging interest or fees", "The firm cannot use trade credit again"], a: 1, e: "'With recourse' means the original firm retains the ultimate bad debt risk if customers fail to pay the factor." },
            { q: "Permanent current assets are best described as the level of current assets that:", o: ["Drops to zero during off-peak seasonal cycles", "Remains constant throughout the year to support minimum long-term baseline operations", "Consists entirely of real estate and equipment", "Is liquidated every 30 days"], a: 1, e: "Even at seasonal lows, a business requires a core baseline of inventory and cash to function; this is called permanent current assets." },
            { q: "A primary goal of a 'Just-in-Time' (JIT) inventory system is to:", o: ["Maximize holding costs to protect against inflation", "Minimize or eliminate inventory levels by having materials arrive exactly as needed for production", "Stock pile raw goods up to a 12-month capacity margin", "Outsource sales collections to factoring houses"], a: 1, e: "JIT aims to improve efficiency and reduce carrying costs by minimizing inventory on hand." }
        ]
    };

    let scores = { mod1: 0, mod2: 0, mod3: 0, mod4: 0, mod5: 0 };

    function switchTab(evt, modId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.module-content').forEach(c => c.classList.remove('active'));
        evt.currentTarget.classList.add('active');
        document.getElementById(modId).classList.add('active');
    }

    function buildQuiz() {
        let globalQIndex = 1;
        for (let mod in examData) {
            const container = document.getElementById(`questions-${mod}`);
            examData[mod].forEach((qData, qIndex) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerText = `${globalQIndex}. ${qData.q}`;
                card.appendChild(qText);

                const optsList = document.createElement('ul');
                optsList.className = 'options-list';

                qData.o.forEach((opt, oIdx) => {
                    const li = document.createElement('li');
                    li.className = 'option-item';
                    li.innerText = `${String.fromCharCode(65 + oIdx)}) ${opt}`;
                    li.onclick = () => handleAnswer(li, mod, qIndex, oIdx, qData.a, optsList, exp);
                    optsList.appendChild(li);
                });

                card.appendChild(optsList);

                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.innerHTML = `<strong>Answer Key: ${String.fromCharCode(65 + qData.a)}</strong><br>${qData.e}`;
                card.appendChild(exp);

                container.appendChild(card);
                globalQIndex++;
            });
        }
    }

    function handleAnswer(selectedLi, mod, qIndex, chosenIdx, correctIdx, optsList, expDiv) {
        optsList.classList.add('disabled');
        if (chosenIdx === correctIdx) {
            selectedLi.classList.add('correct');
            scores[mod]++;
            document.getElementById(`score-${mod}`).innerText = `Score: ${scores[mod]}/20`;
        } else {
            selectedLi.classList.add('incorrect');
            optsList.children[correctIdx].classList.add('correct');
        }
        expDiv.style.display = 'block';
    }

    window.onload = buildQuiz;
</script>
